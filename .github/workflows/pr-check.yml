name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Typecheck, Lint, Format & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
        env:
          LICENCE_CHECK_CACHE_HEX_BANGGGG_EXTRA_USLESS_STUFF_LEAVEIT_YOUWONTFIND_ANYTHING_HERE_BANGGG_DAEMON_TALHAV3HEX: ${{ secrets.LICENCE_CHECK_CACHE_HEX_BANGGGG_EXTRA_USLESS_STUFF_LEAVEIT_YOUWONTFIND_ANYTHING_HERE_BANGGG_DAEMON_TALHAV3HEX }}
